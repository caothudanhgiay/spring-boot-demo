# Tên của pipeline, sẽ hiển thị trong tab "Actions" trên GitHub
name: Java CI/CD with Docker

# Cấu hình trigger: pipeline này sẽ chạy khi có code được push
# hoặc pull request được mở tới nhánh "main"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Định nghĩa các công việc (jobs) sẽ được thực thi
jobs:
  build-and-push:
    # Môi trường để chạy job, "ubuntu-latest" là lựa chọn tiêu chuẩn
    runs-on: ubuntu-latest

    # Quyền cần thiết để GITHUB_TOKEN đẩy package lên GitHub Container Registry
    permissions:
      contents: read
      packages: write

    # Các bước thực thi tuần tự
    steps:
      # Bước 1: Checkout code từ repository về máy ảo thực thi
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Đăng nhập vào GitHub Container Registry (ghcr.io)
      # GITHUB_TOKEN là một secret đặc biệt được GitHub tự động cung cấp
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Bước 3: Build và push Docker image
      # Action này sẽ tự động đọc Dockerfile trong project của bạn
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

  # Job để triển khai ứng dụng lên máy chủ --
  deploy:
    # Job này cần chạy sau khi 'build-and-push' hoàn thành
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 instance
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_KEY }}
          port: 22
          script: |
            # Đăng nhập vào GitHub Container Registry bằng Personal Access Token
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Kéo image mới nhất từ registry
            docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}

            # Dừng và xóa container cũ nếu nó đang tồn tại
            docker stop my-java-app || true
            docker rm my-java-app || true

            # Chạy container mới với các biến môi trường cho database
            docker run -d --name my-java-app \
              -p 8081:8080 \
              -e SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.DB_HOST }}:3306/${{ secrets.DB_NAME }} \
              -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USER }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
              ghcr.io/${{ github.repository }}:${{ github.sha }}
